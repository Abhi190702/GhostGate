{% extends "base.html" %}

{% block content %}
<section class="metrics">
  <div>
    <span>DNS service</span>
    <strong>{{ status.dnsmasq }}</strong>
  </div>
  <div>
    <span>IP forwarding</span>
    <strong>{{ status.forwarding }}</strong>
  </div>
  <div>
    <span>Client</span>
    <strong>{{ status.client_ip }}</strong>
  </div>
  <div>
    <span>Router DNS</span>
    <strong>{{ status.router_dns }}</strong>
  </div>
</section>

<section class="grid">
  <article>
    <h2>Interfaces</h2>
    <pre>{{ interfaces }}</pre>
  </article>
  <article>
    <h2>Routes</h2>
    <pre>{{ routes }}</pre>
  </article>
</section>
{% endblock %}
